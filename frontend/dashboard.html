<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Dashboard Undangan Kania</title>
  <style>
    :root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#241b35;background:#f7f3ff}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;box-sizing:border-box}.card{width:min(560px,100%);background:#fff;border-radius:24px;padding:32px;box-shadow:0 22px 70px rgba(67,36,101,.15);text-align:center}h1{margin:.2rem 0 1rem;color:#6d28d9}p{line-height:1.65}.status{padding:12px 14px;border-radius:12px;background:#f3e8ff}.button{display:inline-block;margin-top:16px;padding:12px 18px;border-radius:999px;background:#7c3aed;color:#fff;text-decoration:none;font-weight:700}.muted{font-size:.88rem;color:#6b6475}code{word-break:break-all}
  </style>
</head>
<body>
  <main class="card">
    <p>Dashboard kustomisasi</p>
    <h1>Undangan Kania</h1>
    <p id="status" class="status">Membaca konfigurasi Apps Script…</p>
    <a id="open-dashboard" class="button" href="#" hidden>Buka dashboard</a>
    <p class="muted">Dashboard sebenarnya dijalankan oleh Google Apps Script agar login dan perubahan data tidak bergantung pada CORS GitHub Pages.</p>
  </main>
  <script type="module">
    import { APP_CONFIG } from "./js/config.js";
    const status = document.querySelector("#status");
    const link = document.querySelector("#open-dashboard");
    const url = APP_CONFIG.webAppUrl.trim();
    if (url.startsWith("https://script.google.com/macros/s/") && url.endsWith("/exec")) {
      link.href = `${url}?page=dashboard`;
      link.hidden = false;
      status.textContent = "Dashboard siap dibuka. Masuk menggunakan password admin yang dibuat saat setupProject().";
    } else {
      status.innerHTML = "Apps Script belum dikonfigurasi. Isi <code>webAppUrl</code> pada <code>frontend/js/config.js</code> terlebih dahulu.";
    }
  </script>
</body>
</html>
